{% extends 'base.html' %}

{% block title %} contact to us {% endblock title %}

{% block body %}

<div class="container-fluid">
    <h2 class="section-title position-relative text-uppercase text-center mx-xl-5 mb-4"><span class="bg-secondary pr-3">Contact Us</span>
    </h2>
    <div class=" px-xl-5">
        <div class=" mb-5 contact-us" style="">
            <div class="contact-form bg-light p-30">
                <div id="success"></div>
                <form name="sentMessage" method="post" action="{% url 'contact:contact-detail' %}">
                    {% csrf_token %}
                    <div class="control-group">
                        {{ form.username }}
                        <p class="help-block text-danger"></p>
                    </div>
                    <div class="control-group">
                        {{ form.email }}
                        <p class="help-block text-danger"></p>
                    </div>
                    <div class="control-group">
                        {{ form.subject }}
                        <p class="help-block text-danger"></p>
                    </div>
                    <div class="control-group">

                        {{ form.body }}

                        <p class="help-block text-danger"></p>
                    </div>
                    <div class="btn-send-message d-flex justify-content-center align-items-center">
                        <button class="btn btn-primary py-2 px-4 mt-2" type="submit" id="sendMessageButton">
                            Send Message
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

{% endblock body %}
